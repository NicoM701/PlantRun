start_run:
  name: Start run
  description: Start a new plant run.
  fields:
    run_name:
      name: Run name
      description: Friendly run title.
      required: true
      selector:
        text:

end_run:
  name: End run
  description: End an active run.
  fields:
    run_id:
      name: Run ID
      description: Unique run identifier.
      required: true
      selector:
        text:

set_phase:
  name: Set phase
  description: Set the phase of a run.
  fields:
    run_id:
      name: Run ID
      required: true
      selector:
        text:
    phase:
      name: Phase
      required: true
      selector:
        select:
          options:
            - growth
            - flower
            - harvest_ready

add_note:
  name: Add note
  description: Add a note/event to a run.
  fields:
    run_id:
      name: Run ID
      required: true
      selector:
        text:
    note:
      name: Note
      required: true
      selector:
        text:

search_cultivar:
  name: Search cultivar (SeedFinder)
  description: Fetch cultivar profile from SeedFinder using species + breeder (fuzzy tolerant). Falls back to local cultivar cache when provider fails.
  fields:
    species:
      name: Species / Strain
      required: true
      selector:
        text:
    breeder:
      name: Breeder
      description: Optional but recommended for SeedFinder lookup precision.
      required: false
      selector:
        text:
    prefer_automatic:
      name: Prefer automatic variants
      description: Prioritize 'Auto/Automatic' matches in ambiguous cultivar names.
      required: false
      selector:
        boolean:

attach_cultivar_to_run:
  name: Attach cultivar to run
  description: Link a stored cultivar profile to a run.
  fields:
    run_id:
      name: Run ID
      required: true
      selector:
        text:
    cultivar_id:
      name: Cultivar ID
      required: true
      selector:
        text:

refresh_cultivar:
  name: Refresh cultivar
  description: Refresh an already stored cultivar from SeedFinder.
  fields:
    cultivar_id:
      name: Cultivar ID
      required: true
      selector:
        text:

bind_sensor_to_run:
  name: Bind sensor/camera to run
  description: Attach or update a sensor binding at any point during a run.
  fields:
    run_id:
      name: Run ID
      required: true
      selector:
        text:
    binding_key:
      name: Binding key
      description: One of temperature, air_humidity, soil_moisture, energy, camera, water.
      required: true
      selector:
        text:
    entity_id:
      name: Entity ID
      required: true
      selector:
        text:

unbind_sensor_from_run:
  name: Unbind sensor/camera from run
  description: Remove a sensor binding while keeping run history.
  fields:
    run_id:
      name: Run ID
      required: true
      selector:
        text:
    binding_key:
      name: Binding key
      required: true
      selector:
        text:
