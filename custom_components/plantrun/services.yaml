start_run:
  name: Start run
  description: Start a new plant run.
  fields:
    run_name:
      name: Run name
      description: Friendly run title.
      required: true
      selector:
        text:

end_run:
  name: End run
  description: End an active run.
  fields:
    run_id:
      name: Run ID
      description: Unique run identifier.
      required: true
      selector:
        text:

set_phase:
  name: Set phase
  description: Set the phase of a run.
  fields:
    run_id:
      name: Run ID
      required: true
      selector:
        text:
    phase:
      name: Phase
      required: true
      selector:
        select:
          options:
            - growth
            - flower
            - harvest_ready

add_note:
  name: Add note
  description: Add a note/event to a run.
  fields:
    run_id:
      name: Run ID
      required: true
      selector:
        text:
    note:
      name: Note
      required: true
      selector:
        text:

search_cultivar:
  name: Search cultivar (SeedFinder)
  description: Fetch cultivar profile from SeedFinder using species + breeder.
  fields:
    species:
      name: Species / Strain
      required: true
      selector:
        text:
    breeder:
      name: Breeder
      required: true
      selector:
        text:

attach_cultivar_to_run:
  name: Attach cultivar to run
  description: Link a stored cultivar profile to a run.
  fields:
    run_id:
      name: Run ID
      required: true
      selector:
        text:
    cultivar_id:
      name: Cultivar ID
      required: true
      selector:
        text:

refresh_cultivar:
  name: Refresh cultivar
  description: Refresh an already stored cultivar from SeedFinder.
  fields:
    cultivar_id:
      name: Cultivar ID
      required: true
      selector:
        text:
