create_run:
  name: Create Run
  description: Create a new plant cultivation run.
  fields:
    friendly_name:
      name: Friendly Name
      description: The human-readable name for this run.
      required: true
      example: "Tomato Balcony 2026"
      selector:
        text:
    start_time:
      name: Start Time
      description: ISO timestamp for when the run started. Optional default is now.
      required: false
      example: "2026-02-25T12:00:00Z"
      selector:
        text:

add_phase:
  name: Add Phase
  description: Add a new phase to an existing run.
  fields:
    run_id:
      name: Run ID
      description: The internal ID of the run. Optional if another selector is used.
      required: false
      example: "abc123def456"
      selector:
        text:
    run_name:
      name: Run Name
      description: Exact friendly name match. Optional alternative to run_id.
      required: false
      selector:
        text:
    use_active_run:
      name: Use Active Run
      description: Resolve target from active runs when run_id/run_name is omitted.
      required: false
      default: false
      selector:
        boolean:
    strict_active_resolution:
      name: Strict Active Resolution
      description: Fail if multiple active runs exist instead of auto-selecting.
      required: false
      default: false
      selector:
        boolean:
    active_run_strategy:
      name: Active Run Strategy
      description: Strategy for choosing an active run when multiple are active.
      required: false
      default: legacy
      selector:
        select:
          options:
            - legacy
            - active_run_id
            - first_active
    phase_name:
      name: Phase Name
      description: The name of the phase (e.g. Seedling, Veg, Flower).
      required: true
      example: "Seedling"
      selector:
        text:

add_note:
  name: Add Note
  description: Add a note to an existing run.
  fields:
    run_id:
      name: Run ID
      description: The internal ID of the run. Optional if another selector is used.
      required: false
      selector:
        text:
    run_name:
