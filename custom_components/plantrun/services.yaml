remove_binding:
  name: Remove Binding
  description: Remove an existing metric binding from a run without deleting historical samples.
  fields:
    run_id:
      name: Run ID
      required: false
      selector:
        text:
    run_name:
      name: Run Name
      required: false
      selector:
        text:
    use_active_run:
      name: Use Active Run
      required: false
      default: false
      selector:
        boolean:
    strict_active_resolution:
      name: Strict Active Resolution
      required: false
      default: false
      selector:
        boolean:
    active_run_strategy:
      name: Active Run Strategy
      required: false
      default: legacy
      selector:
        select:
          options:
            - legacy
            - active_run_id
            - first_active
    binding_id:
      name: Binding ID
      description: Stable internal binding identifier. Preferred for exact removals.
      required: false
      selector:
        text:
    metric_type:
      name: Metric Type
      description: Optional fallback when binding_id is unknown.
      required: false
      selector:
        text:
    sensor_id:
      name: Sensor ID
      description: Optional fallback paired with metric_type when binding_id is unknown.
      required: false
      selector:
        text:

