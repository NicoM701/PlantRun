set_cultivar:
  name: Set Cultivar
  description: Assign a cultivar profile to an active run.
  fields:
    run_id:
      name: Run ID
      description: The internal ID of the run. Optional if another selector is used.
      required: false
      selector:
        text:
    run_name:
      name: Run Name
      description: Exact friendly name match. Optional alternative to run_id.
      required: false
      selector:
        text:
    use_active_run:
      name: Use Active Run
      description: Resolve target from active runs when run_id/run_name is omitted.
      required: false
      default: false
      selector:
        boolean:
    strict_active_resolution:
      name: Strict Active Resolution
      description: Fail if multiple active runs exist instead of auto-selecting.
      required: false
      default: false
      selector:
        boolean:
    active_run_strategy:
      name: Active Run Strategy
      description: Strategy for choosing an active run when multiple are active.
      required: false
      default: legacy
      selector:
        select:
          options:
            - legacy
            - active_run_id
            - first_active
    cultivar_name:
      name: Cultivar Name
      description: Cultivar display name. Used as manual snapshot name and default lookup strain.
      required: true
      example: "Northern Lights"
      selector:
        text:
    breeder:
      name: Breeder
      description: Optional breeder for SeedFinder lookup. If omitted, cultivar is saved as manual entry.
      required: false
      example: "Sensi Seeds"
      selector:
        text:
    strain:
      name: Strain
      description: Optional strain for SeedFinder lookup. Defaults to cultivar_name.
      required: false
      example: "Northern Lights"
      selector:
        text:

