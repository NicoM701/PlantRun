title: PlantRun
views:
  - title: Overview
    path: plantrun
    icon: mdi:sprout
    cards:
      - type: entities
        title: Active Run
        entities:
          - entity: sensor.plantrun_active_run
            name: Active run
          - entity: sensor.plantrun_active_phase
            name: Active phase
          - entity: sensor.plantrun_last_event
            name: Last event

      - type: entities
        title: Active Cultivar
        entities:
          - entity: sensor.plantrun_active_cultivar_name
            name: Cultivar
          - entity: sensor.plantrun_active_cultivar_breeder
            name: Breeder
          - entity: sensor.plantrun_active_cultivar_flower_window
            name: Flower window

      - type: entities
        title: Run Stats
        entities:
          - entity: sensor.plantrun_total_runs
            name: Total runs

      - type: markdown
        title: Sensor binding actions (service calls)
        content: |
          You can attach sensors/camera at any point during a run:
          - `plantrun.bind_sensor_to_run`
            - run_id
            - binding_key: `temperature|air_humidity|soil_moisture|energy|camera|water`
            - entity_id
          - `plantrun.unbind_sensor_from_run`
            - run_id
            - binding_key
