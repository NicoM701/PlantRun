        content: |
          # 🌿 PlantRun Active Dashboard
          ### High-level summary of your active grow.
          
          > **Tip: Need to add a phase or make changes?**
          > Head over to `Settings -> Devices & Services -> PlantRun -> Configure` to use the Setup Wizard!

      - type: entities
